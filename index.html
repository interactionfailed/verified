<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verified human</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e9fffb, #f4f6f8);
    }

    .contact {
      position: fixed;
      top: 20px;
      right: 25px;
      font-size: 14px;
      color: #6b7c93;
      text-decoration: none;
    }

    .page-container {
      display: flex;
      flex-direction: row; /* desktop: naast elkaar */
      gap: 28px;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .photo {
      width: 190px;
      height: 190px;
      object-fit: cover;
      border-radius: 14px;
      filter: grayscale(100%) contrast(1.1);
    }

    .card {
      display: flex;
      flex-direction: column;
      padding: 34px;
      border-radius: 20px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(14px);
      box-shadow: 0 25px 70px rgba(0,0,0,0.12);
    }

    .info h1 {
      margin: 0;
      font-size: 34px;
    }

    .status {
      margin-top: 8px;
      font-size: 16px;
    }

    .verified {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-weight: 500;
      color: #111;
    }

    .offline {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #9ca3af;
      font-size: 16px;
      margin-top: 4px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #9ca3af;
      border-radius: 50%;
      position: relative;
    }

    .dot::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: #9ca3af;
      opacity: 0.6;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.6; }
      70% { transform: scale(2); opacity: 0; }
      100% { opacity: 0; }
    }

    /* MOBIEL */
    @media (max-width: 768px) {
      .page-container {
        flex-direction: column;
        align-items: center;
      }

      .photo {
        width: 150px;
        height: 150px;
        margin-bottom: 16px;
      }

      .card {
        width: 90%;
        max-width: 400px;
      }

      .info h1 {
        font-size: 28px;
        text-align: center;
      }

      .status {
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <a class="contact" href="https://interactionfailed.github.io/leavemealone/">contact →</a>

  <div class="page-container">
    <img class="photo" src="images/blad.jpeg" alt="profile">
    <div class="card">
      <div class="info">
        <h1>Kim</h1>
        <div class="status">
          <span class="verified"><span class="check">✔</span> Verified human</span>
          <span class="offline"><span class="dot"></span> Offline</span>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
